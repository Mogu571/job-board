<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="nav">
    <nav class="nav-in">
      <ul class="nav-links">
        <li><a href="../index.html" class="active">we are hiring</a></li>
      </ul>
    </nav>
  </header>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&#x2715;</button>
      <img src="../images/apply-poster.jpg" alt="投递方式">
    </div>
  </div>

  <div class="detail-wrap">
    <a href="../index.html" class="bk">&larr; 返回职位列表</a>

    <div class="dt-top">
      <div>
        <div class="dt-co">
          <div class="dt-ci" style="background:transparent"><img src="../logos/sp1.svg" style="width:100%;height:100%;object-fit:contain;display:block;border-radius:12px" onerror="this.style.display='none'"></div>
          <span class="dt-cn">SP1 </span>
        </div>
        <h1 class="dt-t">研究与项目调研实习生</h1>
      </div>
      <button class="btn-a" id="applyBtn">投递岗位</button>
    </div>

    <div class="tags"><span class="tag">实习</span><span class="tag">北京/上海</span></div>

    <div>
      <div class="mr"><div class="ml">Posted by</div><div class="mv"><div class="avs"><div class="av" style="background:#a8c686">MR</div></div></div></div>
      <div class="mr"><div class="ml">Location</div><div class="mv"><strong>北京/上海</strong></div></div>

    </div>

    <div class="ds">
      <div class="ml" style="margin-bottom:16px">Description</div>
      <div class="db"><h3>工作职责</h3><ul><li>主动触达来自黑客松、开源社区、校园项目的创作者，完成访谈整理</li><li>将访谈与观察转化为结构清晰的内容，参与社交媒体内容发布</li><li>通过行动验证逻辑，对结果负责</li></ul>
<h3>任职要求</h3><ul><li>强行动力，能自驱从0到1推进事情</li><li>有判断与表达直觉，能把复杂问题讲成60秒能懂的话</li><li>真实好奇心，对创业、新产品和趋势有主动研究习惯</li></ul></div>
    </div>

  <footer class="ft">

    <div style="display:flex;gap:20px"><a href="#">Privacy</a><a href="#">Terms</a></div>

  <script>
    const overlay=document.getElementById('modalOverlay');
    document.getElementById('applyBtn').addEventListener('click',()=>overlay.classList.add('open'));
    document.getElementById('modalClose').addEventListener('click',()=>overlay.classList.remove('open'));
    overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.classList.remove('open'); });
    document.addEventListener('keydown',e=>{ if(e.key==='Escape') overlay.classList.remove('open'); });
  </script>
