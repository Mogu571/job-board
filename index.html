<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Roles — AI Startup Job Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="splash" id="splash">
    <button class="splash-skip" id="splashSkip">跳过</button>
    <div class="splash-inner">
      <p class="splash-line" style="animation-delay:.4s">工作竟然占据了人类一生中的</p>
      <p class="splash-line splash-big" style="animation-delay:.95s"><span class="splash-hl">1/3</span> 时间！</p>
      <p class="splash-line" style="animation-delay:1.9s">如果要一直待在痛苦的流水线工厂里...</p>
      <p class="splash-line splash-em" style="animation-delay:2.55s">该有多难受！</p>
      <p class="splash-line splash-sm" style="animation-delay:3.5s">不过我们为你搜罗了很多年轻的 <em>AI Startup</em></p>
      <p class="splash-line splash-sm" style="animation-delay:4.1s">他们都是怀揣梦想、期待改变世界的团队</p>
      <p class="splash-line splash-sm" style="animation-delay:4.65s">如果你也想加入这样的公司，点击右上角填写表单</p>
      <p class="splash-line splash-sm" style="animation-delay:5.15s">我们会帮助你匹配快速成长中的 <em>Startup</em>！</p>
      <button class="splash-enter" id="splashEnter" style="animation-delay:6s">开始探索 →</button>
    </div>
  </div>

  <header class="nav">
    <nav class="nav-in">
      <ul class="nav-links">
        <li><a href="index.html" class="active">we are hiring</a></li>
      </ul>
      <button class="btn-p" id="applyBtn">投递岗位</button>
    </nav>
  </header>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">&#x2715;</button>
      <img src="images/apply-poster.jpg" alt="投递方式">
    </div>
  </div>

  <div class="wrap">
    <div class="stats" id="stats"></div>
    <div class="filters">
      <button class="chip on" data-f="all">全部</button>
      <button class="chip" data-f="engineering">工程</button>
      <button class="chip" data-f="design">设计</button>
      <button class="chip" data-f="product">产品</button>
      <button class="chip" data-f="operations">运营</button>
      <div class="filter-div"></div>
      <span class="filter-label">类型</span>
      <button class="chip-t on" data-t="all">全部</button>
      <button class="chip-t" data-t="全职">全职</button>
      <button class="chip-t" data-t="实习">实习</button>
      <div class="filter-div"></div>
      <span class="filter-label">地点</span>
      <button class="chip-l on" data-l="all">全部</button>
      <button class="chip-l" data-l="上海">上海</button>
      <button class="chip-l" data-l="北京">北京</button>
      <button class="chip-l" data-l="深圳">深圳</button>
      <button class="chip-l" data-l="杭州">杭州</button>
      <div class="s-wrap">
        <svg class="si" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="搜索职位、公司、城市..." id="q">
      </div>
    </div>
    <div class="tbl">
      <div class="th"><span>Team</span><span>Position</span><span>Type</span><span>Location</span></div>
      <div id="rows"></div>
    </div>
  </div>

  <footer class="ft">
    <span>&copy; 2026 Open Roles</span>
    <div style="display:flex;gap:20px"><a href="#">Privacy</a><a href="#">Terms</a></div>
  </footer>

  <script src="js/data.js"></script>
  <script>
  (function(){
    if(sessionStorage.getItem('splashDone')){
      document.getElementById('splash').remove();
      return;
    }
    document.body.style.overflow='hidden';
    function dismiss(){
      var s=document.getElementById('splash');
      s.classList.add('out');
      document.body.style.overflow='';
      sessionStorage.setItem('splashDone','1');
      setTimeout(function(){s.remove();},800);
    }
    document.getElementById('splashSkip').addEventListener('click',dismiss);
    document.getElementById('splashEnter').addEventListener('click',dismiss);
    setTimeout(dismiss,9000);
  })();
  </script>
  <script>
  const LOGOS={
    'Chatcut':'logos/chatcut.png',
    'Cherry Studio':'logos/cherry-studio.png',
    'Evomap':'logos/evomap.png',
    'Floatboat':'logos/floatboat.png',
    'Humanify':'logos/humanify.png',
    'InsForge':'logos/insforge.png',
    'Kuku':'logos/kuku.png',
    'SP1':'logos/sp1.svg',
    'Skyris':'logos/skyris.png',
    'Tripo':'logos/tripo.png',
    '万物时':'logos/wanwushi.png'
  };

  const companies=new Set(JOBS.map(j=>j.team));
  document.getElementById('stats').innerHTML=`<span><strong>${JOBS.length}</strong> 个职位</span><span><strong>${companies.size}</strong> 家公司</span>`;

  function logoHtml(j){
    const src=LOGOS[j.team];
    if(src) return `<img src="${src}" style="width:100%;height:100%;object-fit:contain;display:block;border-radius:10px" onerror="this.style.display='none'">`;
    return j.ic;
  }

  function renderList(f,t,l,q){
    const $=document.getElementById('rows');
    const list=JOBS.filter(j=>{
      const fd=f==='all'||j.dept===f;
      const ft=t==='all'||j.type===t;
      const fl=l==='all'||j.loc.includes(l);
      const fq=!q||j.pos.toLowerCase().includes(q)||j.team.toLowerCase().includes(q)||j.loc.toLowerCase().includes(q);
      return fd&&ft&&fl&&fq;
    });
    $.innerHTML=list.map((j,i)=>{
      const hasLogo=!!LOGOS[j.team];
      const bgStyle=hasLogo?'background:transparent':`background:${j.c}`;
      return `<a class="jr" href="jobs/${j.id}.html" style="animation-delay:${i*.02}s">
        <div class="ct"><div class="ti" style="${bgStyle}">${logoHtml(j)}</div><span class="tl">${j.team}${j.website?extSvg:''}</span></div>
        <div><div class="pt">${j.pos}</div></div>
        <div><span class="type-tag ${j.type}">${j.type}</span></div>
        <div class="cp">${j.loc}</div>
      </a>`;
    }).join('');
  }

  let cf='all', ct='all', cl='all';
  renderList(cf,ct,cl,'');

  document.querySelectorAll('.chip').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
      b.classList.add('on');
      cf=b.dataset.f;
      renderList(cf,ct,cl,document.getElementById('q').value.toLowerCase());
    });
  });

  document.querySelectorAll('.chip-t').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.chip-t').forEach(c=>c.classList.remove('on'));
      b.classList.add('on');
      ct=b.dataset.t;
      renderList(cf,ct,cl,document.getElementById('q').value.toLowerCase());
    });
  });

  document.querySelectorAll('.chip-l').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.chip-l').forEach(c=>c.classList.remove('on'));
      b.classList.add('on');
      cl=b.dataset.l;
      renderList(cf,ct,cl,document.getElementById('q').value.toLowerCase());
    });
  });

  document.getElementById('q').addEventListener('input',e=>renderList(cf,ct,cl,e.target.value.toLowerCase()));

  // Modal
  const overlay=document.getElementById('modalOverlay');
  document.getElementById('applyBtn').addEventListener('click',()=>overlay.classList.add('open'));
  document.getElementById('modalClose').addEventListener('click',()=>overlay.classList.remove('open'));
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.classList.remove('open'); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') overlay.classList.remove('open'); });
  </script>
</body>
</html>
